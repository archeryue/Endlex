<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Endlex{% endblock %}</title>
  <style>
    :root {
      --fg: #1a1a1a;
      --muted: #666;
      --bg: #fafafa;
      --card: #fff;
      --border: #e3e3e3;
      --accent: #2050b3;
    }
    @media (prefers-color-scheme: dark) {
      :root { --fg:#e6e6e6; --muted:#999; --bg:#15171a; --card:#1e2024; --border:#2c2f34; --accent:#7aa6ff; }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 2rem 1rem;
      font: 14px/1.5 -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--fg); background: var(--bg);
    }
    main { max-width: 1100px; margin: 0 auto; }
    h1 { margin: 0 0 1rem; font-size: 1.6rem; }
    h2 { margin: 2rem 0 .5rem; font-size: 1.1rem; }
    h3 { margin: 0 0 .5rem; font-size: .95rem; color: var(--muted); font-weight: 600; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    table { border-collapse: collapse; width: 100%; }
    th, td { padding: .5rem .75rem; text-align: left; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 600; font-size: .85rem; text-transform: uppercase; letter-spacing: .03em; }
    code, pre { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    pre { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: .75rem; overflow-x: auto; }
    .muted { color: var(--muted); }
    .panel { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 1rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 1rem; }
    details > summary { cursor: pointer; color: var(--muted); padding: .25rem 0; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <main>
    <p><a href="/">&larr; Endlex</a></p>
    {% block body %}{% endblock %}
  </main>
</body>
</html>
